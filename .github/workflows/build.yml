name: build

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      make-release:
        type: boolean
        description: "Create a release from this run"
        default: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact: clicktrack
          - os: ubuntu-latest
            target: x86_64-windows
            artifact: clicktrack.exe
          - os: macos-latest
            target: x86_64-macos
            artifact: clicktrack
          - os: macos-latest
            target: aarch64-macos
            artifact: clicktrack

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - run: |
          set -e
          A=$(uname -m | sed 's/arm64/aarch64/')
          case "$RUNNER_OS" in
            Linux)   curl -sSL "https://ziglang.org/download/0.15.2/zig-$A-linux-0.15.2.tar.xz" | tar xJ;;
            macOS)   curl -sSL "https://ziglang.org/download/0.15.2/zig-$A-macos-0.15.2.tar.xz" | tar xJ;;
            Windows) curl -sSL "https://ziglang.org/download/0.15.2/zig-$A-windows-0.15.2.zip" -o zig.zip && unzip -q zig.zip && rm zig.zip;;
          esac
          echo "$PWD/zig-$A-$(echo $RUNNER_OS | tr 'A-Z' 'a-z')-0.15.2" >> $GITHUB_PATH
        shell: bash

      - run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: clicktrack-${{ matrix.target }}
          path: zig-out/bin/${{ matrix.artifact }}

  create-release:
    if: github.event.inputs.make-release == 'true'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: clicktrack-*
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
